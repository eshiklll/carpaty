<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карпати: музика вітру</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
    width:100%; height:100%;
    overflow:hidden;
    background: linear-gradient(135deg,#0a1a10,#1a5c3a,#0d2318,#1f6b42,#0a1a10,#237a4a,#0d2318);
    background-size: 400% 400%;
    background-position: 0% 0%;
    transition: background-position 1.6s cubic-bezier(.4,0,.2,1), filter 1.3s ease;
    color: #f5ead7;
    font-family: 'Cormorant Garamond', serif;
    touch-action: pan-y;
}

/* SLIDER */
.slider {
    display: flex;
    width: 100%; height: 100vh;
    transition: transform .55s ease;
    will-change: transform;
}

/* PAGE */
.page {
    min-width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    position: relative;
    padding: clamp(16px,3vw,40px);
    background: linear-gradient(rgba(5,8,5,.72), rgba(5,8,5,.72));
}

/* INTRO */
.intro { text-align: center; }
.intro h1 {
    font-size: clamp(50px,8vw,120px);
    margin-bottom: 25px; line-height: 1;
}
.intro p {
    max-width: 1000px; line-height: 1.6;
    font-size: clamp(18px,2vw,34px);
    padding: 0 12px;
}
.authors {
    margin-top: 35px; line-height: 1.5;
    color: #d9c6a5;
    font-size: clamp(22px,2vw,36px);
}

/* LOCATION */
.location {
    position: absolute; top: 18px;
    left: 50%; transform: translateX(-50%);
    width: 90%; text-align: center;
    color: #d9c5a3; letter-spacing: 1px;
    font-size: clamp(18px,1.8vw,30px);
}

/* IMAGE */
.image-container {
    width: 100%; height: 68vh;
    display: flex; justify-content: center; align-items: center;
    margin-top: 25px;
    padding: clamp(5px,2vw,20px);
}
.image-container img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    border-radius: clamp(10px,1vw,20px);
    box-shadow: 0 0 35px rgba(0,0,0,.45);
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
}

/* AUTHOR */
.author {
    margin-top: 15px; text-align: center;
    font-size: clamp(22px,2vw,38px);
}

/* QUOTE */
.quote {
    margin-top: 10px; max-width: 900px;
    text-align: center; line-height: 1.5;
    font-style: italic; color: #d8c4a2;
    padding: 0 15px;
    font-size: clamp(18px,1.7vw,28px);
}

/* CONTROLS */
.controls {
    position: fixed; bottom: 15px;
    left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; z-index: 1000;
}
.controls button {
    width: clamp(48px,5vw,68px);
    height: clamp(48px,5vw,68px);
    border: none; border-radius: 50%;
    background: #dcc9ab; color: #162216;
    cursor: pointer; transition: .25s;
    font-size: clamp(18px,2vw,30px);
}
.controls button:hover { transform: scale(1.08); }

/* COUNTER */
.counter {
    position: fixed; bottom: 22px; right: 18px;
    font-size: clamp(13px,1.1vw,19px);
    color: #d9c5a3; opacity: .7;
    z-index: 1000; font-style: italic;
}

/* HINT */
.hint {
    position: fixed; top: 14px; right: 14px;
    opacity: .7; z-index: 1000;
    text-align: right;
    font-size: clamp(12px,1vw,18px);
}

/* YOUTUBE BUTTON */
.yt-btn {
    display: inline-flex; align-items: center; gap: 12px;
    margin-top: 32px; padding: 16px 38px;
    border-radius: 999px; text-decoration: none;
    background: #dcc9ab; color: #162216;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(20px,2.2vw,30px); font-weight: 600;
    letter-spacing: .5px;
    transition: transform .25s, box-shadow .25s;
    box-shadow: 0 4px 24px rgba(220,201,171,.18);
}
.yt-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 8px 32px rgba(220,201,171,.35);
}
.yt-btn svg {
    width: clamp(24px,2.5vw,36px);
    height: clamp(24px,2.5vw,36px);
    flex-shrink: 0;
}

@media(max-width:768px) {
    .page { justify-content: flex-start; padding-top: 70px; }
    .image-container { height: 58vh; }
}
@media(max-width:480px) {
    .image-container { height: 52vh; }
}

</style>
</head>
<body>

<div class="hint">← → SPACE • Swipe</div>
<div class="controls">
    <button id="prevBtn">←</button>
    <button id="nextBtn">→</button>
</div>
<div class="counter" id="counter"></div>

<div class="slider" id="slider">

    <section class="page intro">
        <h1>Карпати: музика вітру</h1>
        <p>
            Гори говорять мовою тиші.
            Вода пам'ятає шлях крізь каміння.
            А вітер між смереками переносить історії,
            які неможливо записати словами.
        </p>
        <div class="authors">
            Проєкт 10-Г класу<br><br>
            Ілля Трикуліч<br>
            Анастасія
        </div>
    </section>

</div>

<script>

/* AUTHORS */
const authors = {
    "RD": "Рибчинський Денис",
    "DL": "Дідик Валерія",
    "TI": "Трикуліч Ілля",
    "VL": "Ліза Войтенко",
    "om": "Оксана Миколаївна Вусатюк",
    "EG": "Іванов Єгор"
};

/* FILES */
const files = [
    "divochi_slyozu/DL_001.jpg",
    "divochi_slyozu/EG_001.jpg",
    "divochi_slyozu/EG_002.jpg",
    "divochi_slyozu/EG_004.jpg",
    "divochi_slyozu/RD_001.jpg",
    "divochi_slyozu/RD_002.jpg",
    "divochi_slyozu/RD_003.jpg",
    "divochi_slyozu/RD_004.jpg",
    "divochi_slyozu/TI_001.jpg",
    "divochi_slyozu/TI_002.jpg",
    "divochi_slyozu/TI_003.jpg",
    "divochi_slyozu/TI_004.jpg",
    "divochi_slyozu/TI_005.jpg",
    "divochi_slyozu/VL_001.jpg",
    "other/om_001.jpg",
    "skit/RD_001.jpg",
    "vodospad/EG_003.jpg",
    "vodospad/RD_001.jpg",
    "vodospad/TI_001.jpg",
    "vodospad/TI_002.jpg",
    "vodospad/TI_003.jpg"
];

/* QUOTES */
const quotes = [
    "Тиша гір звучить голосніше за слова.",
    "Гори навчають мовчати красиво.",
    "Кожна стежка веде до іншої версії себе.",
    "У Карпатах навіть вітер має душу.",
    "Туман приховує те, що не побачить метушня.",
    "Вода пам'ятає шлях крізь каміння.",
    "Смереки пам'ятають більше за людей.",
    "Там, де закінчується шум — починаються Карпати."
];

function getLocation(path){
    if(path.includes("divochi_slyozu")) return "Водоспад Дівочі сльози";
    if(path.includes("skit"))           return "Манявський скит";
    if(path.includes("vodospad"))       return "Манявський водоспад";
    if(path.includes("other"))          return "Поза межами";
    return "Карпати";
}

function getAuthor(path){
    const file   = path.split("/").pop();
    const prefix = file.split("_")[0];
    return authors[prefix] || "Невідомий автор";
}

/* BUILD PHOTO PAGES */
const slider = document.getElementById("slider");

files.forEach((file, index) => {
    const page = document.createElement("section");
    page.className = "page";
    page.innerHTML = `
        <div class="location">${getLocation(file)}</div>
        <div class="image-container"><img src="${file}" alt="Карпати"></div>
        <div class="author">${getAuthor(file)}</div>
        <div class="quote">"${quotes[index % quotes.length]}"</div>
    `;
    slider.appendChild(page);
});

/* FINAL PAGE */
const finalPage = document.createElement("section");
finalPage.className = "page intro";
finalPage.innerHTML = `
    <h1>Дякуємо за увагу</h1>
    <p>
        Карпати залишаються там,
        де шумить вода,
        де туман торкається смерек,
        і де вітер пам'ятає більше за людей.
    </p>
    <div class="authors">
        10-Г клас<br><br>
        «Карпати: музика вітру»
    </div>
    <a class="yt-btn" href="https://youtu.be/ТУТ_ТВОЄ_ПОСИЛАННЯ" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z" fill="#162216"/>
            <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#dcc9ab"/>
        </svg>
        Дивитись кліп
    </a>
`;
slider.appendChild(finalPage);

/* =====================================================
   SLIDER
===================================================== */
let current = 0;

function getPages(){ return document.querySelectorAll(".slider .page"); }

function updateSlider(){
    slider.style.transform = `translateX(-${current * window.innerWidth}px)`;
    document.getElementById("counter").textContent =
        `${current + 1} / ${getPages().length}`;
}

/* =====================================================
   REACTIVE BACKGROUND
   — 24 hand-picked positions, irregular step logic
===================================================== */
const bgStates = [
    { pos:"0% 0%",     br:1.00 },
    { pos:"80% 20%",   br:1.06 },
    { pos:"30% 90%",   br:0.94 },
    { pos:"100% 50%",  br:1.08 },
    { pos:"15% 60%",   br:0.97 },
    { pos:"60% 10%",   br:1.04 },
    { pos:"90% 80%",   br:1.07 },
    { pos:"40% 40%",   br:0.96 },
    { pos:"70% 100%",  br:1.03 },
    { pos:"5% 30%",    br:1.05 },
    { pos:"55% 70%",   br:0.95 },
    { pos:"85% 5%",    br:1.08 },
    { pos:"20% 85%",   br:1.01 },
    { pos:"45% 55%",   br:0.98 },
    { pos:"95% 40%",   br:1.06 },
    { pos:"10% 10%",   br:0.96 },
    { pos:"75% 65%",   br:1.04 },
    { pos:"35% 20%",   br:1.00 },
    { pos:"65% 90%",   br:1.07 },
    { pos:"50% 0%",    br:0.94 },
    { pos:"25% 45%",   br:1.02 },
    { pos:"88% 60%",   br:0.97 },
    { pos:"12% 75%",   br:1.05 },
    { pos:"58% 35%",   br:1.01 },
];

let bgIdx = 0;

function applyBg(){
    const s = bgStates[bgIdx % bgStates.length];
    document.body.style.backgroundPosition = s.pos;
    document.body.style.filter = `brightness(${s.br})`;
}

function shiftBg(dir){
    // irregular: 60% chance step=1, 30% step=2, 10% step=3
    const r = Math.random();
    const step = r < .6 ? 1 : r < .9 ? 2 : 3;
    bgIdx = ((bgIdx + dir * step) % bgStates.length + bgStates.length) % bgStates.length;
    applyBg();
}

/* =====================================================
   NAVIGATION — single source of truth
===================================================== */
function goNext(){
    const pages = getPages();
    if(current < pages.length - 1){ current++; updateSlider(); shiftBg(1); }
}
function goPrev(){
    if(current > 0){ current--; updateSlider(); shiftBg(-1); }
}

document.getElementById("nextBtn").addEventListener("click", goNext);
document.getElementById("prevBtn").addEventListener("click", goPrev);

document.addEventListener("keydown", (e) => {
    if(e.key === "ArrowRight" || e.key === " ") goNext();
    if(e.key === "ArrowLeft") goPrev();
});

window.addEventListener("resize", updateSlider);

/* SWIPE */
let touchStartX = 0, touchCurX = 0;

slider.addEventListener("touchstart", e => {
    touchStartX = e.touches[0].clientX;
}, { passive:true });

slider.addEventListener("touchmove", e => {
    touchCurX = e.touches[0].clientX;
}, { passive:true });

slider.addEventListener("touchend", () => {
    const diff = touchStartX - touchCurX;
    if(diff >  60) goNext();
    else if(diff < -60) goPrev();
    touchStartX = touchCurX = 0;
});

/* INIT */
applyBg();
updateSlider();

</script>
</body>
</html>
